trigger:
  branches:
    include:
    - main
  paths:
    include:
    - pingfederate/**
    - pingdirectory/**
    - ping-devops-values.yaml

variables:
- group: ping-platform-secrets
- name: imageTag
  value: $(Build.BuildId)
- name: acrName
  value: pinglabacr
- name: acrLoginServer
  value: pinglabacr.azurecr.io
- name: resourceGroup
  value: ping-lab-rg
- name: aksCluster
  value: ping-lab-aks

stages:

# ── STAGE 1: Build and push images ────────────────────────────
- stage: Build
  displayName: Build and push Docker images
  jobs:
  - job: BuildPingFederate
    displayName: Build PingFederate
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: AzureCLI@2
      displayName: Build and push PingFederate to ACR
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr build \
            --registry $(acrName) \
            --image pingfederate:$(imageTag) \
            --image pingfederate:latest \
            --file pingfederate/docker/Dockerfile \
            --build-arg PING_IDENTITY_DEVOPS_USER=$(PING_IDENTITY_DEVOPS_USER) \
            --build-arg PING_IDENTITY_DEVOPS_KEY=$(PING_IDENTITY_DEVOPS_KEY) \
            --platform linux/amd64 \
            pingfederate/

  - job: BuildPingDirectory
    displayName: Build PingDirectory
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: AzureCLI@2
      displayName: Build and push PingDirectory to ACR
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr build \
            --registry $(acrName) \
            --image pingdirectory:$(imageTag) \
            --image pingdirectory:latest \
            --file pingdirectory/docker/Dockerfile \
            --build-arg PING_IDENTITY_DEVOPS_USER=$(PING_IDENTITY_DEVOPS_USER) \
            --build-arg PING_IDENTITY_DEVOPS_KEY=$(PING_IDENTITY_DEVOPS_KEY) \
            --platform linux/amd64 \
            pingdirectory/

# ── STAGE 2: Deploy to Dev ────────────────────────────────────
- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: Helm deploy to dev
    pool:
      vmImage: ubuntu-latest
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Get AKS credentials
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(resourceGroup) \
                  --name $(aksCluster) \
                  --overwrite-existing

          - task: AzureCLI@2
            displayName: Create Kubernetes secrets from variable group
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl create secret generic devops-secret \
                  --namespace ping-dev \
                  --from-literal=PING_IDENTITY_DEVOPS_USER=$(PING_IDENTITY_DEVOPS_USER) \
                  --from-literal=PING_IDENTITY_DEVOPS_KEY=$(PING_IDENTITY_DEVOPS_KEY) \
                  --dry-run=client -o yaml | kubectl apply -f -

                kubectl create secret generic pingfederate-admin-secret \
                  --namespace ping-dev \
                  --from-literal=PF_ADMIN_PASSWORD=$(PF_ADMIN_PASSWORD) \
                  --dry-run=client -o yaml | kubectl apply -f -

                kubectl create secret generic pingdirectory-secrets \
                  --namespace ping-dev \
                  --from-literal=ROOT_USER_PASSWORD=$(PD_ROOT_PASSWORD) \
                  --from-literal=PING_IDENTITY_ACCEPT_EULA=YES \
                  --dry-run=client -o yaml | kubectl apply -f -

          - task: AzureCLI@2
            displayName: Helm upgrade dev
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                helm repo add pingidentity https://helm.pingidentity.com/
                helm repo update

                helm upgrade --install ping pingidentity/ping-devops \
                  -f $(Build.SourcesDirectory)/ping-devops-values.yaml \
                  --set pingfederate-admin.image.tag=$(imageTag) \
                  --set pingfederate-engine.image.tag=$(imageTag) \
                  --set pingdirectory.image.tag=$(imageTag) \
                  --namespace ping-dev \
                  --wait \
                  --timeout 10m

# ── STAGE 3: Smoke tests ──────────────────────────────────────
- stage: TestDev
  displayName: Smoke tests - Dev
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - job: SmokeTest
    displayName: Run smoke tests
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: AzureCLI@2
      displayName: Get AKS credentials
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group $(resourceGroup) \
            --name $(aksCluster) \
            --overwrite-existing

    - script: |
        echo "Waiting for PingFederate engine to be ready..."
        kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=pingfederate-engine \
          -n ping-dev \
          --timeout=300s

        echo "Testing PingFederate heartbeat..."
        kubectl exec -n ping-dev \
          $(kubectl get pod -n ping-dev \
          -l app.kubernetes.io/name=pingfederate-engine \
          -o jsonpath='{.items[0].metadata.name}') \
          -- curl -sk https://localhost:9031/pf/heartbeat.ping | grep -q "ok"

        echo "Testing PingDirectory liveness..."
        kubectl exec -n ping-dev ping-pingdirectory-0 \
          -- /opt/liveness.sh

        echo "All smoke tests passed"
      displayName: Run smoke tests

# ── STAGE 4: Approval gate before Stage ───────────────────────
- stage: ApproveStage
  displayName: "Approval required — promote to Stage?"
  dependsOn: TestDev
  condition: succeeded()
  jobs:
  - job: WaitForApproval
    displayName: Awaiting manual approval to deploy to Stage
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      displayName: Approve promotion to Stage
      inputs:
        notifyUsers: |
          $(Build.RequestedForEmail)
        instructions: |
          Smoke tests have passed on Dev (build $(Build.BuildId)).
          PingFederate engine: healthy
          PingDirectory: healthy
          Approve to deploy to Stage, or reject to stop here.
        onTimeout: reject

# ── STAGE 5: Stage placeholder ────────────────────────────────
- stage: StageIndicator
  displayName: "Stage — deployed (pipeline placeholder)"
  dependsOn: ApproveStage
  condition: succeeded()
  jobs:
  - job: StageDeployIndicator
    displayName: Stage deployment indicator
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        echo "============================================"
        echo " STAGE ENVIRONMENT"
        echo "============================================"
        echo " Build ID   : $(Build.BuildId)"
        echo " Image tag  : $(imageTag)"
        echo " Status     : Approved and ready to deploy"
        echo " Cluster    : ping-stage-aks (not yet created)"
        echo " Namespace  : ping-stage"
        echo "============================================"
        echo " Uncomment DeployStage stage when ready"
        echo "============================================"
      displayName: Stage deployment placeholder

# ── STAGE 6: Approval gate before Prod ───────────────────────
- stage: ApproveProd
  displayName: "Approval required — promote to Prod?"
  dependsOn: StageIndicator
  condition: succeeded()
  jobs:
  - job: WaitForApproval
    displayName: Awaiting manual approval to deploy to Prod
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      displayName: Approve promotion to Prod
      inputs:
        notifyUsers: |
          $(Build.RequestedForEmail)
        instructions: |
          Build $(Build.BuildId) has passed Dev and Stage.
          Approve to deploy to Prod, or reject to stop here.
        onTimeout: reject

# ── STAGE 7: Prod placeholder ─────────────────────────────────
- stage: ProdIndicator
  displayName: "Prod — deployed (pipeline placeholder)"
  dependsOn: ApproveProd
  condition: succeeded()
  jobs:
  - job: ProdDeployIndicator
    displayName: Prod deployment indicator
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        echo "============================================"
        echo " PRODUCTION ENVIRONMENT"
        echo "============================================"
        echo " Build ID   : $(Build.BuildId)"
        echo " Image tag  : $(imageTag)"
        echo " Status     : Approved and ready to deploy"
        echo " Cluster    : ping-prod-aks (not yet created)"
        echo " Namespace  : ping-prod"
        echo "============================================"
        echo " Uncomment DeployProd stage when ready"
        echo "============================================"
      displayName: Prod deployment placeholder

